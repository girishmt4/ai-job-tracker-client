name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install and build
        env:
          VITE_API_URL: /api
        run: |
          npm ci
          npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Trigger Vercel deploy
        run: curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
